spring:
  application:
    name: product-service
  datasource:
    url: jdbc:h2:mem:product_service;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/microservice-realm
          jwk-set-uri: http://localhost:8180/realms/microservice-realm/protocol/openid-connect/certs
  kafka:
    bootstrap-servers: localhost:9092
  cloud:
    stream:
      binders:
        kafka:
          type: kafka
      bindings:
        processOrderEvent-in-0:
          destination: order.events
          group: product-service
          binder: kafka
        inventoryUpdates-out-0:
          destination: product.inventory
          binder: kafka
      function:
        definition: processOrderEvent

server:
  port: 8083
  servlet:
    context-path: /api/v1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: product-service
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  level:
    root: INFO
    com.microservice: DEBUG
