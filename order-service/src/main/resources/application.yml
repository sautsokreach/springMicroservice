spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5433/order_service
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080
  servlet:
    context-path: /api/v1

service:
  user-url: http://localhost:8081/api/v1
  product-url: http://localhost:8083/api/v1

logging:
  level:
    root: INFO
    com.microservice: DEBUG
